<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt AR Marker</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: white;
      padding: 10px;
      border-radius: 10px;
      width: 250px;
    }

    input, button {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
    }

    img {
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="ui">
  <input id="prompt" placeholder="örnek: red dragon logo">
  <button onclick="generate()">Generate</button>

  <img id="preview" />
</div>

<a-scene embedded arjs>

  <a-marker type="pattern" url="pattern-R1.patt">

    <a-box id="box"
      position="0 0.5 0"
      material="color: red;">
    </a-box>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

<script>

function generate() {

  const prompt = document.getElementById("prompt").value;
  const preview = document.getElementById("preview");

  // FAKE AI IMAGE (şimdilik simülasyon)
  const images = {
    "dragon": "https://upload.wikimedia.org/wikipedia/commons/6/6b/Dragon_icon.svg",
    "cat": "https://upload.wikimedia.org/wikipedia/commons/3/3a/Cat03.jpg",
    "default": "https://upload.wikimedia.org/wikipedia/commons/3/3f/Fronalpstock_big.jpg"
  };

  if (prompt.includes("dragon")) {
    preview.src = images.dragon;
  }
  else if (prompt.includes("cat")) {
    preview.src = images.cat;
  }
  else {
    preview.src = images.default;
  }

  // AR effect change (şimdilik bağlama)
  const box = document.getElementById("box");

  if (prompt.includes("blue")) {
    box.setAttribute("material", "color", "blue");
  }
  else if (prompt.includes("green")) {
    box.setAttribute("material", "color", "green");
  }
  else {
    box.setAttribute("material", "color", "red");
  }
}

</script>

</body>
</html>
